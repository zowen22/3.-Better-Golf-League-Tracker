{% extends 'base.html' %}

{% block title %}Login — Golf League Tracker{% endblock %}

{% block content %}
<div class="form-page form-page--centered">
    <h1>Sign In</h1>

    <div class="login-panel card-form">
        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="login_type" value="league">
            <div class="form-group">
                <label for="league_id">League ID</label>
                <input type="text" id="league_id" name="league_id"
                       value="{{ league_id or '' }}" placeholder="e.g. YourLeagueID"
                       required autofocus>
            </div>
            <div class="form-group">
                <label for="pw_league">Password</label>
                <input type="password" id="pw_league" name="password" required>
            </div>
            <div class="form-actions form-actions--full">
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </div>
        </form>
        <p class="form-footer form-footer--spaced">
            New league? <a href="{{ url_for('auth.create_league') }}">Create one here</a>
        </p>
    </div>
</div>
{% endblock %}
