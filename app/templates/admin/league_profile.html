{% extends 'base.html' %}
{% block title %}League Profile{% endblock %}

{% block content %}
<div class="page-header">
    <h1>League Profile</h1>
    <p class="subheading">Change your league's name and login code.</p>
</div>

<div class="form-page" style="max-width:520px;">
    <form method="POST" class="card-form">
        <div class="form-group">
            <label for="league_name">League Name</label>
            <input type="text" id="league_name" name="league_name"
                   value="{{ league_name }}" required autofocus>
        </div>

        <div class="form-group">
            <label for="login_code">League Login Code</label>
            <p class="field-hint">Members type this at login to find your league. Must be unique. Letters, numbers, hyphens, and underscores only.</p>
            <input type="text" id="login_code" name="login_code"
                   value="{{ login_code }}"
                   pattern="[A-Za-z0-9_\-]+" title="Letters, numbers, hyphens, and underscores only"
                   required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('admin.overview') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
