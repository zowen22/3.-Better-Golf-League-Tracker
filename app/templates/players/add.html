{% extends 'base.html' %}

{% block title %}Add Player — {{ session['league_name'] }}{% endblock %}

{% block content %}
<div class="form-page">
    <h1>Add Player</h1>
    <p class="form-subtitle">{{ session['league_name'] }}</p>

    <form method="POST" action="{{ url_for('players.add') }}" class="card-form">
        <div class="form-row">
            <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name"
                       value="{{ first_name }}" required autofocus>
            </div>
            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name"
                       value="{{ last_name }}" required>
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email <span class="optional">(optional)</span></label>
            <input type="email" id="email" name="email" value="{{ email }}">
        </div>

        <div class="form-group">
            <label for="starting_handicap">Starting Handicap <span class="optional">(optional)</span></label>
            <p class="field-hint">Leave blank if the player has no prior handicap. Negatives allowed.</p>
            <input type="number" id="starting_handicap" name="starting_handicap"
                   value="{{ starting_handicap }}" step="0.1" min="-10" max="54">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Player</button>
            <a href="{{ url_for('players.roster') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
