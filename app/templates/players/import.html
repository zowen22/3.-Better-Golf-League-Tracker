{% extends 'base.html' %}

{% block title %}Import Players — {{ session['league_name'] }}{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Import Players</h1>
        <p class="subheading">{{ session['league_name'] }}</p>
    </div>
</div>

<div class="settings-section">
    <h2 class="settings-section-title">Upload CSV File</h2>

    <div class="import-instructions">
        <p>Upload a <strong>.csv</strong> file to add multiple players at once.</p>
        <a href="{{ url_for('players.import_template') }}" class="btn btn-secondary btn-sm">⬇ Download Template</a>
    </div>

    <form method="POST" enctype="multipart/form-data" class="import-form">
        <div class="form-group">
            <label for="csv_file" class="form-label">Choose CSV file</label>
            <input type="file" id="csv_file" name="csv_file" accept=".csv" class="form-input-file" required>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">⬆ Import Players</button>
            <a href="{{ url_for('players.roster') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<div class="back-link">
    <a href="{{ url_for('players.roster') }}">← Back to Players</a>
</div>
{% endblock %}
