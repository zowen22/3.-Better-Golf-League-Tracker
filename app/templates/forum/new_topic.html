{% extends "base.html" %}
{% block title %}New Topic{% endblock %}
{% block content %}

<div class="page-header-actions">
  <h1 class="page-title">💬 New Topic</h1>
  <a href="{{ url_for('forum.index') }}" class="btn btn-secondary btn-sm">← Back to Forum</a>
</div>

<div class="form-card" style="max-width:680px">
  <form method="post">
    <div class="form-group">
      <label for="title">Subject</label>
      <input type="text" id="title" name="title" class="form-control" value="{{ title }}" maxlength="200" placeholder="What's your topic about?" required autofocus>
    </div>
    <div class="form-group">
      <label for="body">Message</label>
      <textarea id="body" name="body" class="form-control" rows="8" placeholder="Write your message here..." required>{{ body }}</textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Post Topic</button>
      <a href="{{ url_for('forum.index') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
