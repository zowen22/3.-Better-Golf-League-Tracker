{% extends 'base.html' %}
{% block title %}New Season — {{ session['league_name'] }}{% endblock %}

{% block content %}
<div class="form-page">
    <h1>New Season</h1>
    <p class="form-subtitle">{{ session['league_name'] }}</p>

    <form method="POST" action="{{ url_for('seasons.create') }}" class="card-form">
        <div class="form-group">
            <label for="season_name">Season Name</label>
            <input type="text" id="season_name" name="season_name"
                   value="{{ season_name }}" placeholder="e.g. Summer 2026" required autofocus>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="start_date">Start Date <span class="optional">(optional)</span></label>
                <input type="date" id="start_date" name="start_date" value="{{ start_date }}">
            </div>
            <div class="form-group">
                <label for="end_date">End Date <span class="optional">(optional)</span></label>
                <input type="date" id="end_date" name="end_date" value="{{ end_date }}">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Season</button>
            <a href="{{ url_for('seasons.index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
