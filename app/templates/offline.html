<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Golf League Tracker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f4f6f0;
            color: #1b4332;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: #1b4332;
        }
        p {
            color: #4a7c59;
            font-size: 1rem;
            line-height: 1.6;
            max-width: 360px;
            margin-bottom: 2rem;
        }
        .cached-links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            width: 100%;
            max-width: 280px;
        }
        .cached-links a {
            display: block;
            background: #2d6a4f;
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.15s;
        }
        .cached-links a:hover { background: #1b4332; }
        .retry-btn {
            margin-top: 1.5rem;
            background: none;
            border: 2px solid #2d6a4f;
            color: #2d6a4f;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }
        .retry-btn:hover { background: #e8f5e9; }
        .divider {
            color: #4a7c59;
            font-size: 0.85rem;
            margin: 1.25rem 0 0.5rem;
        }
    </style>
</head>
<body>
    <div class="offline-icon">⛳</div>
    <h1>You're offline</h1>
    <p>No internet connection detected. You can still view recently visited pages if they were cached.</p>

    <div class="cached-links">
        <a href="/schedule">📅 Schedule</a>
        <a href="/standings">🏆 Standings</a>
        <a href="/players">👤 Players</a>
    </div>

    <p class="divider">Or</p>
    <button class="retry-btn" onclick="window.location.reload()">🔄 Try again</button>

    <script>
        // Auto-retry when connection is restored
        window.addEventListener('online', () => {
            window.location.href = '/';
        });
    </script>
</body>
</html>
