<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Closed — {{ league.league_name }}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f4f0; min-height: 100vh; }
        .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.12); width: 100%; max-width: 400px; padding: 2.5rem 2rem; text-align: center; }
        .icon { font-size: 2.5rem; margin-bottom: 1rem; }
        h1 { font-size: 1.3rem; font-weight: 700; color: #374151; margin: 0 0 .75rem; }
        p { color: #6b7280; font-size: .9rem; line-height: 1.5; }
    </style>
</head>
<body>
<div class="wrap"><div class="card">
  <div class="icon">🔒</div>
  <h1>Registration is Currently Closed</h1>
  <p><strong>{{ league.league_name }}</strong> is not accepting new player registrations at this time.
  Contact the league commissioner directly if you'd like to join.</p>
</div></div>
</body>
</html>
