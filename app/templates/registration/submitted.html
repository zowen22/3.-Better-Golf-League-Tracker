<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Submitted — {{ league.league_name }}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f4f0; color: #1a2e1a; min-height: 100vh;
        }
        .wrap {
            min-height: 100vh; display: flex; align-items: center;
            justify-content: center; padding: 2rem 1rem;
        }
        .card {
            background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.12);
            width: 100%; max-width: 420px; padding: 2.5rem 2rem; text-align: center;
        }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h1 { font-size: 1.4rem; font-weight: 700; color: #2d6a4f; margin: 0 0 .5rem; }
        p { color: #4b5563; font-size: .95rem; margin: .5rem 0; line-height: 1.5; }
        .league-name { font-weight: 600; color: #1a2e1a; }
        .footer { margin-top: 2rem; font-size: .8rem; color: #9ca3af; }
    </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="icon">✅</div>
    <h1>Request Submitted!</h1>
    <p>Thanks, <strong>{{ first_name }} {{ last_name }}</strong>. Your registration request for
    <span class="league-name">{{ league.league_name }}</span> has been received.</p>
    <p>The league commissioner will review your request and add you to the roster.
    You'll be notified when you're ready to play!</p>
    <div class="footer">Powered by BetterGolfLeagueTracker</div>
  </div>
</div>
</body>
</html>
